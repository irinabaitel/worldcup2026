name: Update World Cup

# Ruleaza in cloud-ul GitHub, NU pe laptopul Irinei.
on:
  schedule:
    # Program "inteligent" (ore UTC). Meciurile in SUA/Canada/Mexic sunt ~16:00-04:00
    # UTC; AntenaPLAY posteaza rezumatele cu cateva ore intarziere.
    # Minute "de liniste" (NU :00/:15/:30/:45 unde GitHub e aglomerat si sare rularile).
    #
    # ACTIV (~4x/ora): 15:00-23:59 si 00:00-06:59 UTC = seara/noaptea la noi (se joaca)
    - cron: '8,23,38,53 15-23 * * *'
    - cron: '8,23,38,53 0-6 * * *'
    # LINISTIT (1x/ora la :08): 07:00-14:59 UTC = ziua la noi / noaptea in Americi (pauza)
    - cron: '8 7-14 * * *'
  workflow_dispatch:           # buton de rulare manuala (din tab-ul Actions)

permissions:
  contents: write              # commit/push
  pages: write                 # publicare Pages
  id-token: write              # necesar pentru actions/deploy-pages

concurrency:
  group: update-worldcup
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instaleaza dependinte
        run: pip install requests

      - name: Configureaza git
        run: |
          git config user.name "WorldCup Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Actualizeaza scorurile
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_worldcup.py

      - name: Completeaza marcatorii (din Wikipedia)
        run: python fetch_goals_wiki.py

      - name: Actualizeaza bracketul eliminatoriilor
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python update_knockout.py

      # --- PUBLICARE in ACEEASI rulare ---
      # Un push facut de workflow (GITHUB_TOKEN) NU declanseaza alt workflow
      # (anti-recursie), deci deploy-pages.yml nu pornea din cloud -> site inghetat.
      # Deci publicam aici, dupa ce scripturile au comis modificarile.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Publica pe GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
