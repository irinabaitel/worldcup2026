name: Deploy Pages

# Publicare prin GitHub Actions (build_type=workflow), NU prin build-ul legacy Jekyll
# (care se blocase in starea "building" si tinea site-ul inghetat).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# nu anula un deploy in curs -> lasa-l sa termine
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
