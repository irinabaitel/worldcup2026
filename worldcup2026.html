<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>World Cup 2026</title>
<link rel="icon" type="image/png" sizes="any" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080f1e;color:#f0f4ff;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;user-select:none}

#header{
  position:fixed;top:0;left:0;right:0;height:56px;z-index:100;
  background:linear-gradient(90deg,#0a1628,#0d2347,#0a1628);
  border-bottom:1px solid #1e3a6e;
  display:flex;align-items:center;justify-content:center;gap:20px;
}
#header h1{font-size:1.3rem;letter-spacing:3px;color:#e8c84a;text-shadow:0 0 20px rgba(232,200,74,0.5)}
#header .sub{font-size:0.75rem;color:#6a8ab5;letter-spacing:2px}

#nav{
  position:fixed;bottom:0;left:0;right:0;height:52px;z-index:100;
  background:#0a1628;border-top:1px solid #1e3a6e;
  display:flex;align-items:center;justify-content:center;gap:12px;
}
.btn{background:transparent;color:#7ab3e8;border:1px solid #2a4a7a;padding:6px 18px;border-radius:20px;cursor:pointer;font-size:0.82rem;transition:all 0.2s;letter-spacing:1px;}
.btn:hover{background:#1a3a6e;color:#fff;border-color:#4a8acf}
#groupLabel{color:#e8c84a;font-size:0.85rem;letter-spacing:2px;min-width:120px;text-align:center}
#hint{color:#3a5a8a;font-size:0.75rem}

/* ── LAYOUT SPLIT ── */
#main{position:fixed;top:56px;left:0;right:0;bottom:52px;display:flex;}
#viewport{flex:1;overflow:hidden;position:relative;border-right:1px solid #1e3a6e;}
#videopanel{
  width:340px;flex-shrink:0;
  background:#060d1a;
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* ── VIDEO PANEL ── */
#vp-header{
  padding:10px 12px 8px;
  background:#0a1628;border-bottom:1px solid #1e3a6e;
  flex-shrink:0;
}
#vp-header .vp-title{font-size:0.85rem;color:#e8c84a;letter-spacing:2px;margin-bottom:8px}

#vp-search{
  width:100%;padding:7px 10px;border-radius:8px;
  background:#071020;border:1px solid #2a4a7a;
  color:#f0f4ff;font-size:0.82rem;outline:none;
  transition:border-color 0.2s;margin-bottom:7px;
}
#vp-search::placeholder{color:#3a5a8a}
#vp-search:focus{border-color:#4a9ae0}

#vp-days{display:flex;gap:4px;flex-wrap:wrap;}
.vp-day-btn{
  background:transparent;border:1px solid #2a4a7a;color:#6a8ab5;
  padding:3px 8px;border-radius:12px;cursor:pointer;font-size:0.68rem;
  transition:all 0.15s;letter-spacing:0.5px;
}
.vp-day-btn:hover{border-color:#4a9ae0;color:#aad4f8}
.vp-day-btn.active{background:#1a3a6e;border-color:#4a9ae0;color:#e8c84a}

/* player embed */
#vp-player{flex-shrink:0;background:#000;width:100%;aspect-ratio:16/9;display:none;}
#vp-player iframe{width:100%;height:100%;border:none;}

/* lista clipuri */
#vp-list{flex:1;overflow-y:auto;padding:6px 8px;}
#vp-list::-webkit-scrollbar{width:4px}
#vp-list::-webkit-scrollbar-thumb{background:#1e3a6e;border-radius:4px}
#vp-empty{color:#3a5a8a;font-size:0.82rem;text-align:center;padding:24px 0;}
/* top marcatori */
#vp-top-btn{width:100%;margin-top:7px;padding:7px;border-radius:8px;background:#0d2a0d;border:1px solid #2a6a2a;color:#4acf4a;cursor:pointer;font-size:0.78rem;letter-spacing:1px;transition:all 0.2s;}
#vp-top-btn:hover,#vp-top-btn.active{background:#1a4a1a;color:#6aef6a;border-color:#4acf4a;}
.ts-head{font-size:0.78rem;color:#e8c84a;letter-spacing:2px;text-align:center;padding:6px 0 10px;font-weight:700;}
.ts-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;margin-bottom:3px;background:#0a1830;border:1px solid #14233f;}
.ts-row.gold{background:linear-gradient(90deg,#3a2e0a,#0a1830);border-color:#e8c84a;}
.ts-rank{width:18px;text-align:center;color:#6a8ab5;font-weight:700;font-size:0.78rem;}
.ts-flag{font-size:1.05rem;}
.ts-name{flex:1;color:#d0e4ff;font-size:0.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ts-goals{color:#e8c84a;font-weight:700;font-size:0.9rem;}

.vp-item{
  display:flex;gap:8px;align-items:center;
  padding:6px 7px;border-radius:8px;cursor:pointer;
  border:1px solid transparent;transition:all 0.15s;margin-bottom:4px;
}
.vp-item:hover{background:#0d1e3a;border-color:#2a4a7a}
.vp-item.active{background:#0d2040;border-color:#4a9ae0}
.vp-item .vi-thumb{
  position:relative;width:80px;flex-shrink:0;border-radius:5px;overflow:hidden;
}
.vp-item .vi-thumb img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover;}
.vp-item .vi-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.35);opacity:0;transition:opacity 0.15s;font-size:1.1rem;
}
.vp-item:hover .vi-play{opacity:1}
.vp-item.active .vi-play{opacity:1;background:rgba(255,0,0,0.5)}
.vp-item .vi-info{flex:1;min-width:0}
.vp-item .vi-day{font-size:0.63rem;color:#4a7aaa;letter-spacing:1px;margin-bottom:2px}
.vp-item .vi-match{font-size:0.78rem;font-weight:600;color:#d0e4ff;line-height:1.3;word-break:break-word}

/* ── GROUPS MAP ── */
#world{position:absolute;transform-origin:0 0;transition:transform 0.9s cubic-bezier(0.25,1,0.5,1);}

.gcard{position:absolute;width:290px;background:linear-gradient(135deg,#0d1e3a 0%,#0a1628 100%);border:1px solid #1e3a6e;border-radius:14px;cursor:pointer;transition:border-color 0.3s,box-shadow 0.3s;overflow:hidden;}
.gcard:hover{border-color:#3a7acf;box-shadow:0 0 25px rgba(58,122,207,0.25)}
.gcard.zoomed{border-color:#4a9ae0;cursor:default;box-shadow:0 0 40px rgba(74,154,224,0.3)}
.gcard-head{padding:12px 16px 10px;background:linear-gradient(90deg,#0d2347,#0a1e3a);border-bottom:1px solid #1e3a6e;display:flex;align-items:center;gap:10px;}
.gcard-head .glabel{font-size:1.3rem;font-weight:700;color:#e8c84a;letter-spacing:2px;white-space:nowrap}
.gcard-head .gteams-mini{font-size:0.68rem;color:#6a8ab5;line-height:1.6}
.gcard-body{padding:10px 12px 12px}
.standings{width:100%;border-collapse:collapse;font-size:0.76rem;margin-bottom:8px}
.standings th{color:#4a7aaa;font-weight:600;font-size:0.65rem;letter-spacing:1px;padding:3px 2px;border-bottom:1px solid #1e3a6e;text-align:center}
.standings th.left{text-align:left}
.standings td{padding:4px 2px;text-align:center;border-bottom:1px solid #0d1e3a}
.standings td.team-cell{text-align:left;font-weight:600;font-size:0.76rem}
.standings tr:last-child td{border-bottom:none}
.standings tr.qualified td{color:#4acfa0}
.standings .flag{font-size:0.9rem;margin-right:3px}
.standings .pts-cell{color:#e8c84a;font-weight:700}
.matches-title{font-size:0.65rem;color:#4a7aaa;letter-spacing:2px;margin-bottom:5px;margin-top:2px}
.match{display:flex;align-items:center;justify-content:space-between;padding:4px 5px;border-radius:5px;margin-bottom:2px;background:#071020;font-size:0.7rem;border:1px solid #0d1e3a;}
.match .home{text-align:right;flex:1;font-size:0.7rem;overflow:hidden;white-space:nowrap}
.match .away{text-align:left;flex:1;font-size:0.7rem;overflow:hidden;white-space:nowrap}
.match .score{background:#0d2040;border:1px solid #2a4a7a;padding:2px 6px;border-radius:4px;font-weight:700;font-size:0.78rem;min-width:40px;text-align:center;flex-shrink:0;margin:0 4px;}
.match .score.pending{color:#3a5a8a;font-size:0.62rem;font-weight:400}
.match .score.played{color:#e8c84a}
.match .score.today{color:#ff9940}

/* ── GOALSCORERS POPUP ── */
#goals-popup{
  display:none;position:fixed;z-index:300;
  background:#0d1e3a;border:1px solid #4a9ae0;border-radius:12px;
  padding:14px 18px;min-width:200px;max-width:280px;
  box-shadow:0 8px 32px rgba(0,0,0,0.7);
  pointer-events:auto;
}
#goals-popup .gp-title{font-size:0.72rem;color:#4a9ae0;letter-spacing:2px;margin-bottom:8px}
#goals-popup .gp-score{font-size:1.2rem;font-weight:700;color:#e8c84a;text-align:center;margin-bottom:8px}
#goals-popup .gp-teams{display:flex;justify-content:space-between;gap:8px;}
#goals-popup .gp-col{flex:1;}
#goals-popup .gp-col.right{text-align:right;}
#goals-popup .gp-goal{font-size:0.75rem;color:#d0e4ff;padding:2px 0;line-height:1.4}
#goals-popup .gp-goal .min{color:#4a7aaa;font-size:0.68rem;}
#goals-popup .gp-no-goals{font-size:0.78rem;color:#4a7aaa;text-align:center;padding:4px 0;}
#goals-popup .gp-team-name{font-size:0.7rem;color:#e8c84a;font-weight:700;letter-spacing:1px;margin-bottom:5px;border-bottom:1px solid #1e3a6e;padding-bottom:3px;}
.match.played{cursor:pointer;}
.match.played:hover{background:#0d2040;border-color:#2a4a7a;}

/* ── UPDATE TIP ── */

/* ── BRACKET ELIMINATORII ── */
#bracket{position:absolute;inset:0;background:#080f1e;overflow:auto;display:none;padding:20px 26px;z-index:5;-webkit-overflow-scrolling:touch;}
#viewport.show-bracket #world{display:none;}
#viewport.show-bracket #bracket{display:flex;align-items:flex-start;justify-content:center;}
.bracket-wrap{display:flex;min-width:max-content;min-height:100%;padding:6px 0;}
.ko-round{display:flex;flex-direction:column;min-width:172px;}
.ko-round:not(:last-child){margin-right:30px;}
.ko-round-title{font-size:0.66rem;color:#e8c84a;letter-spacing:1.2px;text-align:center;margin-bottom:10px;text-transform:uppercase;font-weight:700;flex-shrink:0;white-space:nowrap;}
.ko-cells{flex:1;display:flex;flex-direction:column;}
.ko-cell{flex:1;display:flex;align-items:center;position:relative;}
.ko-cell>.ko-match{width:100%;}
/* ── conectoare arbore (orizontale + verticale) ── */
.ko-round:not(:last-child) .ko-cell::after{content:'';position:absolute;left:100%;top:50%;transform:translateY(-50%);width:17px;height:2px;background:#34527e;}
.ko-round:not(:last-child) .ko-cells>.ko-cell:nth-child(odd)::before{content:'';position:absolute;left:calc(100% + 15px);top:calc(50% - 1px);width:2px;height:calc(100% + 2px);background:#34527e;}
.ko-round:not(:first-child) .ko-cell>.ko-match::before{content:'';position:absolute;left:-15px;top:50%;transform:translateY(-50%);width:15px;height:2px;background:#34527e;}
.ko-match{background:linear-gradient(135deg,#0d1e3a,#0a1628);border:1px solid #1e3a6e;border-radius:8px;padding:5px 8px;position:relative;}
.ko-match.empty{opacity:0.45;border-style:dashed;}
.ko-row{display:flex;justify-content:space-between;align-items:center;gap:6px;padding:2px 0;font-size:0.74rem;color:#cde0fb;}
.ko-row+.ko-row{border-top:1px solid #14233f;}
.ko-team{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ko-sc{color:#e8c84a;font-weight:700;flex-shrink:0;min-width:14px;text-align:right;}
.ko-row.win .ko-team{color:#4acfa0;font-weight:700;}
.ko-foot{height:13px;line-height:13px;text-align:center;margin-top:2px;overflow:hidden;}
.ko-date{font-size:0.6rem;color:#5a7398;letter-spacing:0.5px;}
.ko-pen{font-size:0.58rem;color:#e8c84a;letter-spacing:0.3px;opacity:0.9;}
.ko-match.ko-played{cursor:pointer;}
.ko-match.ko-played:hover{filter:brightness(1.28);}
/* diferentiere prin CULOARE pe runde (border card + titlu) */
.ko-t1{border-color:#3a6aa8;}
.ko-t2{border-color:#2aa0a0;box-shadow:0 0 8px rgba(42,185,185,0.22);}
.ko-t3{border-color:#3ac070;box-shadow:0 0 11px rgba(60,200,120,0.30);}
.ko-t4{border-color:#e0922a;box-shadow:0 0 15px rgba(230,150,40,0.38);}
.bracket-wrap>.ko-round:nth-child(1) .ko-round-title{color:#5a9ad8;}
.bracket-wrap>.ko-round:nth-child(2) .ko-round-title{color:#3ad0d0;}
.bracket-wrap>.ko-round:nth-child(3) .ko-round-title{color:#4ad888;}
.bracket-wrap>.ko-round:nth-child(4) .ko-round-title{color:#f0a850;}
/* ── finala: mare, decalata la dreapta, cu cupa langa ea; loc 3 discret jos-stanga ── */
.ko-final-round{position:relative;justify-content:center;}
.ko-final-cell{display:flex;align-items:center;gap:12px;margin-left:185px;}
.ko-final-cell>.ko-match{width:auto;}
.ko-cup-img{width:54px;flex-shrink:0;filter:drop-shadow(0 0 12px #e8c84abb);}
.ko-big{border:2px solid #e8c84a !important;box-shadow:0 0 26px rgba(232,200,74,0.55) !important;min-width:172px;padding:8px 12px;background:linear-gradient(135deg,#1a2545,#0c1730) !important;}
.ko-big .ko-row{font-size:0.85rem;padding:3px 0;}
.ko-big .ko-sc{color:#ffd84a;}
.ko-third{position:absolute;top:50%;transform:translateY(calc(-50% + 72px));left:0;}
.ko-third-row{display:flex;align-items:center;gap:8px;}
.ko-final-label{font-size:0.56rem;color:#9aa0ae;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;text-align:center;}
.ko-small-final{min-width:150px;border:2px solid #c8ccd6 !important;box-shadow:0 0 13px rgba(200,205,220,0.45) !important;background:linear-gradient(135deg,#1a2230,#0c1424) !important;}
.ko-medal{font-size:1.5rem;flex-shrink:0;filter:drop-shadow(0 0 6px rgba(200,205,220,0.55));}
/* ── taburi mobil (Grupe / Highlights) — ascunse pe desktop ── */
#mobile-tabs{display:none;position:fixed;top:56px;left:0;right:0;height:42px;z-index:50;background:#0a1424;border-bottom:1px solid #1e3a6e;}
.mtab{flex:1;background:none;border:none;color:#6a8ab5;font-size:0.95rem;font-weight:700;letter-spacing:0.5px;cursor:pointer;border-bottom:3px solid transparent;}
.mtab.active{color:#e8c84a;border-bottom-color:#e8c84a;}

/* ── optimizare telefon ── */
@media(max-width:760px){
  #bracket{padding:12px;}
  .ko-round{min-width:140px;}
  .ko-round:not(:last-child){margin-right:24px;}
  .ko-row{font-size:0.67rem;}
  .ko-cup-img{width:42px;}
  .ko-big{min-width:150px;}

  /* taburi sus + coboara continutul sub ele */
  #mobile-tabs{display:flex;}
  #main{top:98px;}                       /* 56 header + 42 taburi */

  /* o singura sectiune vizibila pe rand; implicit GRUPE */
  #viewport{position:absolute;inset:0;border-right:none;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
  #videopanel{position:absolute;inset:0;width:auto;display:none;}
  body.m-hl #viewport{display:none;}
  body.m-hl #videopanel{display:flex;}

  /* grupele ca LISTA VERTICALA (anuleaza harta zoom-abila) */
  #world{position:static !important;transform:none !important;width:auto !important;height:auto !important;padding:10px;}
  .gcard{position:static !important;left:auto !important;top:auto !important;width:auto !important;margin:0 0 14px !important;cursor:default;}
  #viewport.show-bracket{overflow:auto;}

  /* bara de jos: ascunde butoanele de zoom irelevante pe telefon */
  .mob-hide{display:none !important;}

  /* bracket pe telefon: derulare laterala cu degetul, fara taierea rundei din stanga
     (justify-content:center taie inceputul cand continutul e mai lat decat ecranul) */
  #viewport.show-bracket #bracket{justify-content:flex-start;padding:14px;}
}
</style>
</head>
<body>

<div id="header">
  <h1><img src="cupa.png" height="42" style="vertical-align:middle;margin-right:10px;filter:drop-shadow(0 0 6px #e8c84a88)">WORLD CUP 2026</h1>
  <div class="sub">USA · CANADA · MEXICO &nbsp;|&nbsp; 11 iun – 19 iul 2026</div>
</div>

<div id="mobile-tabs">
  <button id="mtab-grupe" class="mtab active" onclick="mShow('grupe')">⚽ Grupe</button>
  <button id="mtab-hl" class="mtab" onclick="mShow('hl')">🎬 Highlights</button>
</div>

<div id="main">
  <div id="viewport"><div id="world"></div><div id="bracket"></div></div>

  <div id="videopanel">
    <div id="vp-header">
      <div class="vp-title">⚽ HIGHLIGHT-URI</div>
      <input id="vp-search" type="text" placeholder="Caută echipă... (ex: Argentina)" oninput="vpFilter()">
      <div id="vp-days"></div>
      <button id="vp-top-btn" onclick="toggleScorers()">🏆 Top 10 Marcatori</button>
    </div>
    <div id="vp-list"><div id="vp-empty"></div></div>
  </div>
</div>

<div id="nav">
  <button class="btn" id="koBtn" onclick="toggleBracket()" style="border-color:#6a5a2a;color:#e8c84a">🏆 Eliminatorii</button>
  <button class="btn mob-hide" onclick="zoomOut()">⊙ Toate grupele</button>
  <button class="btn mob-hide" onclick="prevGroup()">◀ Înapoi</button>
  <span id="groupLabel" class="mob-hide"></span>
  <button class="btn mob-hide" onclick="nextGroup()">Înainte ▶</button>
  <span id="hint" class="mob-hide" style="margin-left:12px">ESC = zoom out · ← → = navigare</span>
</div>

<div id="goals-popup">
  <div class="gp-title">⚽ MARCATORI</div>
  <div class="gp-score" id="gp-score"></div>
  <div class="gp-teams" id="gp-teams"></div>
</div>

let vpActiveDay = 'toate';
let vpActiveId = null;

// Build stage filter buttons
const STAGES = ['Toate', 'Grupe', 'Șaisprezecimi', 'Optimi', 'Sferturi', 'Semifinale', 'Finala mică', 'Finala'];
(function(){
  const cont = document.getElementById('vp-days');
  STAGES.forEach(s=>{
    const key = s==='Toate' ? 'toate' : s;
    const b = document.createElement('button');
    b.className = 'vp-day-btn' + (s==='Toate'?' active':'');
    b.textContent = s;
    b.dataset.stage = key;
    b.onclick = ()=>{ vpActiveDay=key; cont.querySelectorAll('.vp-day-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); vpFilter(); };
    cont.appendChild(b);
  });
})();

function vpFilter(){
  const _tb=document.getElementById('vp-top-btn'); if(_tb)_tb.classList.remove('active');
  const q = document.getElementById('vp-search').value.trim().toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g,'');
  const list = document.getElementById('vp-list');
  list.innerHTML = '';
  const filtered = HIGHLIGHTS.filter(h=>{
    const matchStage = vpActiveDay==='toate' || h.stage===vpActiveDay;
    const text = (h.m + ' grupa ' + (h.group||'')).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    const matchQ = !q || text.includes(q);
    return matchStage && matchQ;
  });
  if(!filtered.length){
    list.innerHTML = '<div id="vp-empty">Niciun clip găsit.</div>';
    return;
  }
  filtered.forEach(h=>{
    const div = document.createElement('div');
    div.className = 'vp-item' + (h.id===vpActiveId?' active':'');
    div.innerHTML = `<div class="vi-thumb"><img src="https://img.youtube.com/vi/${h.id}/mqdefault.jpg" loading="lazy"><div class="vi-play">▶</div></div><div class="vi-info"><div class="vi-day">${h.day}</div><div class="vi-match">${h.m}</div></div>`;
    div.onclick = ()=>vpPlay(h.id);
    list.appendChild(div);
  });
}

function vpPlay(id){
  vpActiveId = id;
  window.open(`https://www.youtube.com/watch?v=${id}`, '_blank');
  vpFilter();
}

// ─── TOP MARCATORI (calculat din datele de goluri -> se auto-actualizeaza) ───
function _flagOf(team){
  for(const gr of Object.values(GROUPS)){ const t=gr.teams.find(x=>x.n===team); if(t) return t.f; }
  return '';
}
// emoji-steag -> imagine (codul de tara derivat din regional-indicator, 🇧🇷->br)
function flagImg(f){
  if(!f) return '';
  if(f.indexOf('<img')===0) return f;                 // deja imagine (Anglia/Scoția)
  const cps = Array.from(f).map(c=>c.codePointAt(0)).filter(c=>c>=0x1F1E6 && c<=0x1F1FF);
  if(cps.length===2){
    const code = cps.map(c=>String.fromCharCode(c-0x1F1E6+97)).join('');
    return `<img src="https://flagcdn.com/${code}.svg" style="height:1em;width:auto;vertical-align:-2px;border-radius:2px;box-shadow:0 0 0 0.5px rgba(255,255,255,0.25)">`;
  }
  return f;
}
function computeTopScorers(){
  const tally = {};
  const stripD = s => s.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();
  const add = (arr, team)=>{
    (arr||[]).forEach(g=>{
      if(/csc$/.test(g)) return;                       // autogolul nu se numara
      const name = g.replace(/\s+\d+(\+\d+)?'(pen)?$/, '').trim();
      if(!name) return;
      const key = stripD(name);                        // uneste variantele cu/fara diacritice ("Mbappé"="Mbappe")
      if(!tally[key]) tally[key] = {g:0, team, name};
      tally[key].g++;
      // afiseaza numele CU diacritice daca exista o varianta cu diacritice
      if(/[^\x00-\x7F]/.test(name) && !/[^\x00-\x7F]/.test(tally[key].name)) tally[key].name = name;
    });
  };
  Object.values(GROUPS).forEach(gr => gr.matches.forEach(m=>{
    if(m.goals){ add(m.goals.h, m.h); add(m.goals.a, m.a); }
  }));
  Object.values(KNOCKOUT).forEach(arr => (arr||[]).forEach(m=>{
    if(m && m.goals){ add(m.goals.h, m.h); add(m.goals.a, m.a); }
  }));
  const all = Object.entries(tally)
    .map(([name,v]) => ({name, goals:v.g, flag:_flagOf(v.team)}))
    .sort((a,b) => b.goals-a.goals || a.name.localeCompare(b.name));
  // prag = golurile celui de-al 10-lea jucator; ii includem pe TOTI cei cu cel
  // putin atatea goluri -> toti egalii pe locul 10 intra, oricati ar fi
  const cutoff = all.length > 10 ? all[9].goals : 0;
  const top = all.filter(p => p.goals >= cutoff);
  // rang partajat (1,2,2,4...): 1 + cati au STRICT mai multe goluri
  top.forEach(p => p.rank = 1 + all.filter(x => x.goals > p.goals).length);
  return top;
}
function renderScorers(){
  const btn = document.getElementById('vp-top-btn'); if(btn) btn.classList.add('active');
  const list = document.getElementById('vp-list');
  const top = computeTopScorers();
  if(!top.length){ list.innerHTML = '<div id="vp-empty">Încă niciun gol înregistrat.</div>'; return; }
  list.innerHTML = '<div class="ts-head">🏆 TOP 10 MARCATORI</div>' + top.map(p=>
    `<div class="ts-row${p.rank===1?' gold':''}"><span class="ts-rank">${p.rank}</span><span class="ts-flag">${flagImg(p.flag)}</span><span class="ts-name">${p.name}</span><span class="ts-goals">${p.goals} ⚽</span></div>`
  ).join('');
}
function toggleScorers(){
  const btn = document.getElementById('vp-top-btn');
  if(btn && btn.classList.contains('active')) vpFilter();   // inapoi la clipuri
  else renderScorers();
}

const KO_STRUCTURE = [
  {key:'Șaisprezecimi', n:16},
  {key:'Optimi',        n:8},
  {key:'Sferturi',      n:4},
  {key:'Semifinale',    n:2},
];

function koCard(m, opts){
  opts = opts || {};
  const extra = ' ko-t'+(opts.tier||1) + (opts.big?' ko-big':'') + (opts.small?' ko-small-final':'');
  if(!m || (!m.h && !m.a)){
    return `<div class="ko-match empty${extra}"><div class="ko-row"><span class="ko-team">?</span><span class="ko-sc"></span></div><div class="ko-row"><span class="ko-team">?</span><span class="ko-sc"></span></div><div class="ko-foot"></div></div>`;
  }
  const played = Array.isArray(m.score);
  const pen = Array.isArray(m.pen) ? m.pen : null;     // [penGazda, penOaspete] daca s-a decis la penalty-uri
  // castigatoarea: la penalty-uri dupa pen, altfel dupa scor
  const hw = played && (pen ? pen[0]>pen[1] : m.score[0]>m.score[1]) ? ' win' : '';
  const aw = played && (pen ? pen[1]>pen[0] : m.score[1]>m.score[0]) ? ' win' : '';
  const s0 = played ? m.score[0] : '';
  const s1 = played ? m.score[1] : '';
  const footInner = (!played && m.date) ? `<span class="ko-date">${m.date}</span>`
                  : (pen ? `<span class="ko-pen">⚽ ${pen[0]}–${pen[1]} la penalty-uri</span>` : '');
  const foot = `<div class="ko-foot">${footInner}</div>`;   // mereu prezent -> carduri de aceeasi inaltime
  const click = (played && opts.key!=null) ? ` onclick="showKoGoals(event,'${opts.key}',${opts.idx})" title="Click pentru marcatori"` : '';
  const pc = played ? ' ko-played' : '';
  return `<div class="ko-match${extra}${pc}"${click}>`
    + `<div class="ko-row${hw}"><span class="ko-team">${m.hf||''} ${m.h||'?'}</span><span class="ko-sc">${s0}</span></div>`
    + `<div class="ko-row${aw}"><span class="ko-team">${m.af||''} ${m.a||'?'}</span><span class="ko-sc">${s1}</span></div>`
    + foot + `</div>`;
}

function renderBracket(){
  let html = '<div class="bracket-wrap">';
  KO_STRUCTURE.forEach((r,ri)=>{
    const real = KNOCKOUT[r.key] || [];
    const arr = real.length ? real : Array.from({length:r.n}, ()=>null);
    html += `<div class="ko-round"><div class="ko-round-title">${r.key}</div><div class="ko-cells">`;
    arr.forEach((m,i)=>{ html += `<div class="ko-cell">${koCard(m,{key:r.key,idx:i,tier:ri+1})}</div>`; });
    html += `</div></div>`;
  });
  // Coloana finala: finala mare cu cupa langa ea + finala mica (loc 3) discreta jos-stanga
  const finalM = (KNOCKOUT['Finala']||[])[0] || null;
  const thirdM = (KNOCKOUT['Finala mică']||[])[0] || null;
  html += '<div class="ko-round ko-final-round"><div class="ko-round-title">Finala</div>';
  html += '<div class="ko-cells"><div class="ko-cell ko-final-cell">';
  html += koCard(finalM, {big:true, key:'Finala', idx:0});
  html += '<img class="ko-cup-img" src="cupa.png" alt="Cupa Mondială">';
  html += '</div></div>';
  html += '<div class="ko-third"><div class="ko-final-label">Finala mică · loc 3</div>';
  html += '<div class="ko-third-row">' + koCard(thirdM, {small:true, key:'Finala mică', idx:0}) + '<span class="ko-medal">🥉</span></div>';
  html += '</div></div>';
  document.getElementById('bracket').innerHTML = html;
}

function showKoGoals(e, key, idx){
  e.stopPropagation();
  const m = (KNOCKOUT[key]||[])[idx];
  if(!m || !Array.isArray(m.score)) return;
  const pop = document.getElementById('goals-popup');
  document.getElementById('gp-score').textContent = `${m.h} ${m.score[0]}–${m.score[1]} ${m.a}`;
  const gh = (m.goals&&m.goals.h)||[], ga = (m.goals&&m.goals.a)||[];
  let html;
  if(!gh.length && !ga.length){
    html = '<div class="gp-no-goals">Date indisponibile</div>';
  } else {
    html = '<div class="gp-teams"><div class="gp-col">';
    html += `<div class="gp-team-name">${m.hf||''} ${m.h}</div>`;
    gh.forEach(g=>{ html+=`<div class="gp-goal">⚽ ${g}</div>`; });
    if(!gh.length) html+='<div class="gp-goal" style="color:#3a5a8a">–</div>';
    html += '</div><div class="gp-col right">';
    html += `<div class="gp-team-name">${m.a} ${m.af||''}</div>`;
    ga.forEach(gr=>{ html+=`<div class="gp-goal">${gr} ⚽</div>`; });
    if(!ga.length) html+='<div class="gp-goal" style="color:#3a5a8a">–</div>';
    html += '</div></div>';
  }
  document.getElementById('gp-teams').innerHTML = html;
  pop.style.left = Math.min(e.clientX+10, window.innerWidth-300)+'px';
  pop.style.top = Math.min(e.clientY-10, window.innerHeight-200)+'px';
  pop.style.display = 'block';
}

function toggleBracket(){
  const vp = document.getElementById('viewport');
  if(isMobile()) document.body.classList.remove('m-hl');   // arata zona grupe/bracket, nu highlights
  const on = vp.classList.toggle('show-bracket');
  document.getElementById('koBtn').textContent = on ? '⊙ Înapoi la grupe' : '🏆 Eliminatorii';
  if(on) renderBracket();
}

// ─── STANDINGS ────────────────────────────────────────────────────────────────
function calcStandings(gk){
  const g=GROUPS[gk], s={};
  g.teams.forEach(t=>{ s[t.n]={n:t.n,f:t.f,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
  g.matches.forEach(m=>{
    if(Array.isArray(m.score)){
      const [hg,ag]=m.score, h=s[m.h], a=s[m.a];
      if(!h||!a) return;
      h.p++;a.p++;h.gf+=hg;h.ga+=ag;a.gf+=ag;a.ga+=hg;
      if(hg>ag){h.w++;h.pts+=3;a.l++;}
      else if(hg<ag){a.w++;a.pts+=3;h.l++;}
      else{h.d++;h.pts++;a.d++;a.pts++;}
    }
  });
  return Object.values(s).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
const COLS=4, CARD_W=290, CARD_H=490, GAP_X=28, GAP_Y=26, PAD=36;
const GKEYS=Object.keys(GROUPS);
const world=document.getElementById('world');
const vp=document.getElementById('viewport');

function renderCard(gk,idx){
  const g=GROUPS[gk];
  const col=idx%COLS, row=Math.floor(idx/COLS);
  const left=PAD+col*(CARD_W+GAP_X), top=PAD+row*(CARD_H+GAP_Y);
  const st=calcStandings(gk);
  const rows=st.map((t,i)=>`<tr class="${i<2?'qualified':''}"><td class="team-cell"><span class="flag">${t.f}</span>${t.n}</td><td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gf}</td><td>${t.ga}</td><td class="pts-cell">${t.pts}</td></tr>`).join('');
  const monthIdx={ian:1,feb:2,mar:3,apr:4,mai:5,iun:6,iul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  const dateKey=d=>{ if(!d) return 9999; const p=d.split(' '); return (monthIdx[p[1]]||99)*100+(parseInt(p[0])||0); };
  // jucate primele (cronologic), nejucate la final (in ordinea in care se vor juca)
  const ordered=g.matches.map((m,mi)=>({m,mi})).sort((x,y)=>{
    const px=Array.isArray(x.m.score)?0:1, py=Array.isArray(y.m.score)?0:1;
    return px!==py ? px-py : dateKey(x.m.date)-dateKey(y.m.date);
  });
  const mrows=ordered.map(({m,mi})=>{
    let sc,cls;
    if(Array.isArray(m.score)){sc=`${m.score[0]}–${m.score[1]}`;cls='played';}
    else if(m.score==='azi'){sc='azi';cls='today';}
    else{sc=m.date||'–';cls='pending';}
    const hf=g.teams.find(t=>t.n===m.h)?.f||'', af=g.teams.find(t=>t.n===m.a)?.f||'';
    const clickAttr = cls==='played' ? ` onclick="showGoals(event,'${gk}',${mi})" title="Click pentru marcatori"` : '';
    return `<div class="match ${cls}"${clickAttr}><span class="home">${hf} ${m.h}</span><span class="score ${cls}">${sc}</span><span class="away">${m.a} ${af}</span></div>`;
  }).join('');
  const miniTeams=g.teams.map(t=>`${t.f} ${t.n}`).join(' · ');
  const div=document.createElement('div');
  div.className='gcard';div.id='g-'+gk;
  div.style.left=left+'px';div.style.top=top+'px';div.style.width=CARD_W+'px';
  div.innerHTML=`<div class="gcard-head" style="border-top:3px solid ${g.color}"><span class="glabel">GRUPA ${gk}</span><span class="gteams-mini">${miniTeams}</span></div><div class="gcard-body"><table class="standings"><thead><tr><th class="left">Echipă</th><th>J</th><th>V</th><th>E</th><th>Î</th><th>GM</th><th>GP</th><th>Pct</th></tr></thead><tbody>${rows}</tbody></table><div class="matches-title">MECIURI</div>${mrows}</div>`;
  div.onclick=(e)=>{ if(e.target.closest('.match.played')) return; zoomTo(idx); };
  world.appendChild(div);
}

const worldW=PAD*2+COLS*(CARD_W+GAP_X)-GAP_X;
const worldH=PAD*2+3*(CARD_H+GAP_Y)-GAP_Y;
world.style.width=worldW+'px';world.style.height=worldH+'px';
GKEYS.forEach((gk,i)=>renderCard(gk,i));

// ─── GOALSCORERS POPUP ────────────────────────────────────────────────────────
const popup = document.getElementById('goals-popup');
let popupTimeout;

function showGoals(e, gk, mi){
  e.stopPropagation();
  const m = GROUPS[gk].matches[mi];
  if(!Array.isArray(m.score)) return;

  document.getElementById('gp-score').textContent = `${m.h} ${m.score[0]}–${m.score[1]} ${m.a}`;

  const goals = m.goals;
  let html = '';
  if(!goals || (!goals.h.length && !goals.a.length)){
    html = '<div class="gp-no-goals">Date indisponibile</div>';
  } else {
    const grp = GROUPS[gk];
    const hTeam = grp.teams.find(t=>t.n===m.h);
    const aTeam = grp.teams.find(t=>t.n===m.a);
    html = '<div class="gp-teams">';
    html += '<div class="gp-col">';
    html += `<div class="gp-team-name">${hTeam?.f||''} ${m.h}</div>`;
    (goals.h||[]).forEach(g=>{ html+=`<div class="gp-goal">⚽ ${g}</div>`; });
    if(!goals.h.length) html+='<div class="gp-goal" style="color:#3a5a8a">–</div>';
    html += '</div>';
    html += '<div class="gp-col right">';
    html += `<div class="gp-team-name">${m.a} ${aTeam?.f||''}</div>`;
    (goals.a||[]).forEach(gr=>{ html+=`<div class="gp-goal">${gr} ⚽</div>`; });
    if(!goals.a.length) html+='<div class="gp-goal" style="color:#3a5a8a">–</div>';
    html += '</div></div>';
  }
  document.getElementById('gp-teams').innerHTML = html;

  // pozitionare langa click
  const px = Math.min(e.clientX + 10, window.innerWidth - 300);
  const py = Math.min(e.clientY - 10, window.innerHeight - 200);
  popup.style.left = px + 'px';
  popup.style.top = py + 'px';
  popup.style.display = 'block';
}

document.addEventListener('click', (e)=>{
  if(!popup.contains(e.target)) popup.style.display='none';
});

// ─── ZOOM ─────────────────────────────────────────────────────────────────────
let currentIdx=-1, _tx=0, _ty=0, _sc=1;
const isMobile=()=>window.matchMedia('(max-width:760px)').matches;

// taburi Grupe / Highlights (doar pe telefon)
function mShow(which){
  const hl = which==='hl';
  if(!hl) exitBracket();                  // 'Grupe' = lista grupelor (iese din bracket daca era deschis)
  document.body.classList.toggle('m-hl', hl);
  const tg=document.getElementById('mtab-grupe'), th=document.getElementById('mtab-hl');
  if(tg) tg.classList.toggle('active', !hl);
  if(th) th.classList.toggle('active', hl);
}

function applyTransform(tx,ty,sc,animate){
  _tx=tx;_ty=ty;_sc=sc;
  world.style.transition=animate?'transform 0.85s cubic-bezier(0.25,1,0.5,1)':'none';
  world.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;
}
function fitAll(){
  if(isMobile())return;                  // pe telefon = lista verticala, fara zoom
  const vw=vp.clientWidth, vh=vp.clientHeight;
  const sc=Math.min((vw-20)/worldW,(vh-20)/worldH,1);
  applyTransform((vw-worldW*sc)/2,(vh-worldH*sc)/2,sc,true);
}
function zoomTo(idx){
  if(isMobile())return;                  // pe telefon nu zoom-am pe card
  exitBracket();
  const gk=GKEYS[idx], col=idx%COLS, row=Math.floor(idx/COLS);
  const cx=PAD+col*(CARD_W+GAP_X)+CARD_W/2, cy=PAD+row*(CARD_H+GAP_Y)+CARD_H/2;
  const vw=vp.clientWidth, vh=vp.clientHeight;
  const sc=Math.min((vw*0.9)/CARD_W,(vh*0.9)/CARD_H);
  applyTransform(vw/2-cx*sc,vh/2-cy*sc,sc,true);
  document.querySelectorAll('.gcard').forEach(c=>c.classList.remove('zoomed'));
  document.getElementById('g-'+gk).classList.add('zoomed');
  currentIdx=idx;
  document.getElementById('groupLabel').textContent='GRUPA '+gk;
}
function exitBracket(){
  const v=document.getElementById('viewport');
  if(v.classList.contains('show-bracket')){
    v.classList.remove('show-bracket');
    document.getElementById('koBtn').textContent='🏆 Eliminatorii';
  }
}
function zoomOut(){
  exitBracket();
  document.querySelectorAll('.gcard').forEach(c=>c.classList.remove('zoomed'));
  currentIdx=-1;document.getElementById('groupLabel').textContent='';fitAll();
}
function nextGroup(){if(currentIdx<GKEYS.length-1)zoomTo(currentIdx+1);}
function prevGroup(){if(currentIdx>0)zoomTo(currentIdx-1);else if(currentIdx===0)zoomOut();}

window.addEventListener('keydown',e=>{
  if(e.key==='Escape')zoomOut();
  if(e.key==='ArrowRight')nextGroup();
  if(e.key==='ArrowLeft')prevGroup();
});
window.addEventListener('resize',()=>{if(currentIdx===-1)fitAll();else zoomTo(currentIdx);});

// ─── DRAG ─────────────────────────────────────────────────────────────────────
let dragging=false,dragStartX=0,dragStartY=0,dragTx=0,dragTy=0;
vp.addEventListener('mousedown',e=>{
  if(e.button!==0)return;dragging=true;
  dragStartX=e.clientX;dragStartY=e.clientY;dragTx=_tx;dragTy=_ty;
  vp.style.cursor='grabbing';e.preventDefault();
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  _tx=dragTx+(e.clientX-dragStartX);_ty=dragTy+(e.clientY-dragStartY);
  world.style.transition='none';
  world.style.transform=`translate(${_tx}px,${_ty}px) scale(${_sc})`;
});
window.addEventListener('mouseup',()=>{dragging=false;vp.style.cursor='';});

// ─── SCROLL ZOOM ──────────────────────────────────────────────────────────────
vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const factor=e.deltaY<0?1.12:1/1.12;
  const newSc=Math.max(0.12,Math.min(8,_sc*factor));
  const rect=vp.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  _tx=mx-(mx-_tx)*(newSc/_sc);_ty=my-(my-_ty)*(newSc/_sc);_sc=newSc;
  world.style.transition='none';
  world.style.transform=`translate(${_tx}px,${_ty}px) scale(${_sc})`;
},{passive:false});

fitAll();

// ─── AUTO-REFRESH DISCRET ─────────────────────────────────────────────────────
// Date mereu proaspete fara refresh manual. Nu deranjeaza cat derulezi/te uiti:
// reincarca doar (a) cand revii in tab dupa o pauza, sau (b) periodic cand pagina
// e vizibila si neatinsa de >2 min, fara popup deschis. Clipurile se deschid in tab
// nou, deci reload-ul nu intrerupe niciun video.
(function(){
  let lastInteract = Date.now();
  ['click','touchstart','scroll','keydown','input','wheel'].forEach(ev =>
    window.addEventListener(ev, ()=>{ lastInteract = Date.now(); }, {passive:true, capture:true}));
  const busy = ()=>{
    const p = document.getElementById('goals-popup');
    return p && p.style.display === 'block';            // popup marcatori deschis
  };
  document.addEventListener('visibilitychange', ()=>{   // (a) revii in tab dupa pauza
    if(!document.hidden && Date.now()-lastInteract > 90*1000) location.reload();
  });
  setInterval(()=>{                                     // (b) periodic, doar cand e idle
    if(document.hidden || busy()) return;
    if(Date.now()-lastInteract < 2*60*1000) return;     // te uiti activ -> nu deranja
    location.reload();
  }, 5*60*1000);
})();
</script>
